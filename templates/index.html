<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namma kadai</title>
 
</head>

<body>
    
    <header><h1 id="company-name">Company Name : {{name}}</h1></header>
    <hr>

    <div id="cash-balance">
        <h2>Cash Balance available: RS. {{balance}}</h2>
    </div>    
    
    <div id="main-container">
        <div class="left">

            <div id="add-item" class="card">        
                <h3 style="color: #0f5f7d;">Add Items:</h3>
                
                <label>Item name:</label>
                <input type="text" id="add-item-inp" placeholder="Enter item name" required> <br><br>
                <button class="action-btn" id="add-item-btn">Add item</button>
            </div>

            <h3 style="color: #0f5f7d;">Items Available:</h3>

            <table id="itemsTable" cellpadding="5">
            
                <thead>
                    <tr>
                        <th style="width: 100px;">Item id</th>
                        <th>Item name</th>
                        <th>Actions</th>
                    </tr>
                </thead>
            
                <tbody>
                    {% if items %}
                    {% for item in items %}
                    <tr>
                        <td>{{ item.id }}</td>
                        <td>{{ item.name }}</td>
                        <td>
                            {{ item.actions }}
                            <button class="edit-btn" data-id="{{ item.id }}" data-name="{{ item.name }}">Edit</button>
                        </td>    
                    </tr>
                        {% endfor %}
                        {% else %}
                    <tr>
                        <td colspan="3" style="text-align: center;">No items available</td>
                    </tr>
                    {% endif %}
                </tbody>
            </table>
        </div>
